name: Build executable package

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build app executable
        shell: bash
        run: |
          pyinstaller \
            --name ffmpeg-gui \
            --onefile \
            --windowed \
            app.py

      - name: Prepare artifact folder
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/ffmpeg-gui.exe artifacts/;
          else
            cp dist/ffmpeg-gui artifacts/;
          fi

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-gui-${{ runner.os }}
          path: artifacts/*